spring.application.name=SoftwareEngineer-test

# Force in-memory database for tests
spring.datasource.url=jdbc:h2:mem:softwareengineer_test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Hibernate schema managed by JPA for isolated tests
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.boot.allow_jdbc_metadata_access=true

# Disable Flyway and console during tests
spring.flyway.enabled=false
spring.h2.console.enabled=false

