# Pipeline CI/CD - Java com Maven
# Etapas: Build → Test → Cobertura → Deploy (GitHub Pages)
# O site gerado (relatórios de testes + cobertura) é publicado como uma URL pública.

name: Java CI/CD with Maven

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

# Permissões necessárias para o job de deploy-pages
permissions:
  contents: read
  pages: write
  id-token: write
  checks: write

jobs:
  # ──────────────────────────────────────────
  # ETAPA 1 — BUILD
  # Compila o projeto
  # ──────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: softwareengineer
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 25
      uses: actions/setup-java@v4
      with:
        java-version: '25'
        distribution: 'temurin'
        cache: maven
    
    - name: Wait for PostgreSQL to be ready
      run: |
        for i in {1..30}; do
          if pg_isready -h localhost -p 5432 -U postgres; then
            echo "PostgreSQL is ready!"
            break
          fi
          echo "Waiting for PostgreSQL... ($i/30)"
          sleep 1
        done
      env:
        PGPASSWORD: postgres
    
    - name: Create PostgreSQL Database
      run: createdb -h localhost -U postgres -w softwareengineer || true
      env:
        PGPASSWORD: postgres
    
    - name: Compile with Maven
      run: ./mvnw clean install
      env:
        DB_URL: jdbc:postgresql://localhost:5432/softwareengineer
        DB_DRIVER: org.postgresql.Driver
        DB_USER: postgres
        DB_PASSWORD: postgres
        DATABASE_PLATFORM: org.hibernate.dialect.PostgreSQLDialect
        DDL_AUTO: validate
        FLYWAY_ENABLED: "true"
        ALLOW_JDBC_METADATA: "false"
        H2_CONSOLE: "false"

    

  # ──────────────────────────────────────────
  # ETAPA 2 — TESTES
  # Executa os testes unitários
  # ──────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: build

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 25
      uses: actions/setup-java@v4
      with:
        java-version: '25'
        distribution: 'temurin'
        cache: maven

    - name: Run Tests with Maven
      run: ./mvnw test
      env:
        FLYWAY_ENABLED: "true"
        ALLOW_JDBC_METADATA: "false"
        H2_CONSOLE: "false"