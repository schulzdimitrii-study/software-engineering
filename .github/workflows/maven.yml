# Pipeline CI/CD - Java com Maven
# Etapas: Build → Test → Cobertura → Deploy (GitHub Pages)
# O site gerado (relatórios de testes + cobertura) é publicado como uma URL pública.

name: Java CI/CD with Maven

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main", "dev" ]

# Permissões necessárias para o job de deploy-pages
permissions:
  contents: read
  pages: write
  id-token: write
  checks: write

jobs:
  # ──────────────────────────────────────────
  # ETAPA 1 — BUILD
  # Compila o projeto
  # ──────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: ${{secrets.DB_NAME}}
          POSTGRES_USER: ${{secrets.DB_USER}}
          POSTGRES_PASSWORD: ${{secrets.DB_PASSWORD}}
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 25
      uses: actions/setup-java@v4
      with:
        java-version: '25'
        distribution: 'temurin'
        cache: maven
    
    - name: Wait for PostgreSQL to be ready
      run: |
        for i in {1..30}; do
          if pg_isready -h localhost -p 5432 -U ${{secrets.DB_USER}}; then
            echo "PostgreSQL is ready!"
            break
          fi
          echo "Waiting for PostgreSQL... ($i/30)"
          sleep 1
        done
      env:
        PGPASSWORD: ${{secrets.DB_PASSWORD}}
    
    - name: Create PostgreSQL Database
      run: createdb -h localhost -U ${{secrets.DB_USER}} -w ${{secrets.DB_NAME}} || true
      env:
        PGPASSWORD: ${{secrets.DB_PASSWORD}}
    
    - name: Compile with Maven
      run: ./mvnw clean install -DskipTests
      env:
        DB_URL: jdbc:postgresql://localhost:5432/softwareengineer
        DB_DRIVER: org.postgresql.Driver
        DB_USER: ${{secrets.DB_USER}}
        DB_PASSWORD: ${{secrets.DB_PASSWORD}}
        DATABASE_PLATFORM: org.hibernate.dialect.PostgreSQLDialect
        DDL_AUTO: validate
        FLYWAY_ENABLED: "true"
        ALLOW_JDBC_METADATA: "false"
        H2_CONSOLE: "false"

    - name: Upload Artifact (Deploy)
      uses: actions/upload-artifact@v4
      with:
        name: software-engineering-app
        path: target/*.jar

  # ──────────────────────────────────────────
  # ETAPA 2 — TESTES
  # Executa os testes unitários
  # ──────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: build

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 25
      uses: actions/setup-java@v4
      with:
        java-version: '25'
        distribution: 'temurin'
        cache: maven

    - name: Run Tests with Maven
      run: ./mvnw test
      env:
        SPRING_PROFILE_ACTIVE: test

  # ──────────────────────────────────────────
  # ETAPA 3 — NOTIFICAÇÃO
  # Instala msmtp na VM e envia e-mail com o resultado do pipeline
  # ──────────────────────────────────────────
  notify:
    runs-on: ubuntu-latest
    needs: [build, test]
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Determine build status
        id: status
        run: |
          if [ "${{ needs.build.result }}" = "success" ] && [ "${{ needs.test.result }}" = "success" ]; then
            echo "result=success" >> $GITHUB_OUTPUT
          else
            echo "result=failure" >> $GITHUB_OUTPUT
          fi

      - name: Send email notification
        run: bash .github/scripts/send_notification.sh
        env:
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          NOTIFICATION_EMAIL: ${{ secrets.NOTIFICATION_EMAIL }}
          BUILD_STATUS: ${{ steps.status.outputs.result }}
          REPOSITORY: ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
          COMMIT_SHA: ${{ github.sha }}
          ACTOR: ${{ github.actor }}