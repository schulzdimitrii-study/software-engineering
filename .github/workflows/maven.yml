# Pipeline CI/CD - Java with Maven and Docker
# Etapas: Code Analysis -> Security Scan -> Build -> Test -> Deploy Docker -> Deploy Pages -> Notification

name: Java CI/CD with Maven and Docker

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main", "dev" ]

permissions:
  contents: read
  pages: write
  id-token: write
  packages: write
  checks: write

jobs:
  # ---------------------------
  # ETAPA 1: ANALISE DE CÓDIGO
  # Checa se o código está de acordo com as regras do Checkstyle
  # ---------------------------
  code-analysis:
    name: Code Quality Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Run Checkstyle
        run: ./mvnw checkstyle:check

  # ---------------------------
  # ETAPA 2: SCAN DE VULNERABILIDADES
  # Checa se o código tem vulnerabilidades
  # ---------------------------
  security-scan:
    name: Security Vulnerability Scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          format: 'table'
          exit-code: 0
          severity: 'CRITICAL,HIGH'
  
  # ---------------------------
  # ETAPA 3: BUILD
  # Compila o código e gera o JAR
  # ---------------------------
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 25
      uses: actions/setup-java@v4
      with:
        java-version: '25'
        distribution: 'temurin'
        cache: maven
    
    - name: Compile with Maven
      run: ./mvnw clean package -DskipTests

    - name: Upload JAR artifact
      uses: actions/upload-artifact@v4
      with:
        name: software-engineering-app
        path: target/*.jar

  # ---------------------------
  # ETAPA 4: TESTES
  # Executa os testes e gera o relatório de cobertura
  # ---------------------------
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: build

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 25
      uses: actions/setup-java@v4
      with:
        java-version: '25'
        distribution: 'temurin'
        cache: maven

    - name: Run Tests with Maven
      run: ./mvnw clean test
      env:
        SPRING_PROFILES_ACTIVE: test

    - name: Publish test results
      uses: dorny/test-reporter@v1
      if: always()
      with:
        name: JUnit Test Results
        path: target/surefire-reports/*.xml
        reporter: java-junit
        fail-on-error: true
      
    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: surefire-reports
        path: target/surefire-reports/*.xml
        retention-days: 7

  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' 
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven
      
      - name: Run JaCoCo tests
        run: ./mvnw clean verify

      - name: Upload JaCoCo HTML report
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco/
          retention-days: 7
  
  # ---------------------------
  # ETAPA 5: DEPLOY
  # Envia o JAR para o Docker Hub
  # ---------------------------
  deploy-docker:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [test, coverage]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
    - uses: actions/checkout@v4

    - name: Download JAR artifact
      uses: actions/download-artifact@v4
      with:
        name: software-engineering-app
        path: target

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v6
      with:
        context: .
        file: ./Dockerfile
        push: true
        tags: |
          ghcr.io/${{ github.repository_owner }}/software-engineering:latest
          ghcr.io/${{ github.repository_owner }}/software-engineering:${{ github.sha }}
  
  # ---------------------------
  # ETAPA 6: DEPLOY PAGES
  # Envia o site para o GitHub Pages
  # ---------------------------
  deploy-pages:
    name: Publish Documentation and Test Reports Online
    needs: [test, coverage]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' 

    environment:
      name: github-pages
      url: ${{ steps.publish_to_web.outputs.page_url }}

    steps:
      - name: Download Repository Source Code
        uses: actions/checkout@v4

      - name: Configure Java 25 Environment
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Recompile Project and Generate Detailed Testing HTML Site
        run: ./mvnw clean verify site

      - name: Package Generated Site Directory as a Valid GitHub Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: target/site/

      - name: Publish the Packaged Artifact to the Live GitHub Pages URL
        id: publish_to_web
        uses: actions/deploy-pages@v4

  # ---------------------------
  # ETAPA 7: NOTIFICAÇÃO
  # Envia email com o status do build
  # ---------------------------
  notify:
    runs-on: ubuntu-latest
    needs: coverage
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' 
    steps:
      - uses: actions/checkout@v4

      - name: Determine build status
        id: status
        run: |
          if [ "${{ needs.build.result }}" = "success" ] && [ "${{ needs.test.result }}" = "success" ] && [ "${{ needs.deploy-docker.result }}" != "failure" ]; then
            echo "result=success" >> $GITHUB_OUTPUT
          else
            echo "result=failure" >> $GITHUB_OUTPUT
          fi

      - name: Send email notification
        run: bash .github/scripts/send_notification.sh
        env:
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          NOTIFICATION_EMAIL: ${{ secrets.NOTIFICATION_EMAIL }}
          BUILD_STATUS: ${{ steps.status.outputs.result }}
          REPOSITORY: ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
          COMMIT_SHA: ${{ github.sha }}
          ACTOR: ${{ github.actor }}